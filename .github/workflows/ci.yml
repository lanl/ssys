name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Lint with ruff
      run: |
        uv run ruff check .

    - name: Run tests with pytest
      run: |
        uv run pytest --cov=ssys --cov-report=xml --cov-report=term-missing

    - name: Enforce critical coverage
      run: |
        uv run coverage report --fail-under=75
        uv run coverage report --include=src/ssys/_validator/*.py --fail-under=72
        uv run coverage report --include=src/ssys/notebook_helpers.py --fail-under=80
        uv run coverage report --include=src/ssys/ode_backends/roadrunner_backend.py --fail-under=60
        uv run coverage report --include=src/ssys/ode_backends/interface.py --fail-under=82
        uv run coverage report --include=src/ssys/ode_backends/ida_sundials_backend.py --fail-under=79
        uv run coverage report --include=src/ssys/ode_backends/dae_backend.py --fail-under=85

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Type check with mypy
      run: |
        uv run mypy src/ --ignore-missing-imports

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Build package
      run: uv run --with build python -m build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  artifact-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Download built packages
      uses: actions/download-artifact@v4
      with:
        name: dist-packages
        path: dist/

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install wheel in isolated environment
      run: |
        python -m venv .wheel-smoke
        . .wheel-smoke/bin/activate
        python -m pip install --upgrade pip
        python -m pip install dist/*.whl

    - name: Run installed CLI smoke workflow
      run: |
        . .wheel-smoke/bin/activate
        tmpdir="$(mktemp -d)"
        cat > "$tmpdir/decay.ant" <<'EOF'
        model decay()
            species X;
            X' = -k*X;
            k = 0.5;
            X = 1.0;
        end
        EOF
        printf '%s\n' "$tmpdir/decay.ant" > "$tmpdir/models.manifest"
        ssys-recast --version
        ssys-recast --manifest "$tmpdir/models.manifest" --outdir "$tmpdir/out"
        test -s "$tmpdir/out/decay_recast.ant"

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    env:
      SSYS_REQUIRE_DAE_VALIDATION: "1"
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install integration dependencies
      run: |
        uv sync --extra dev --extra dae

    - name: Run full model integration validation
      run: |
        uv run pytest tests/test_integration.py -m slow -v
