name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Lint with ruff
      run: |
        uv run ruff check .

    - name: Run tests with pytest
      run: |
        uv run pytest --cov=ssys --cov-report=xml --cov-report=term-missing

    - name: Enforce critical coverage
      run: |
        uv run coverage report --include=src/ssys/ode_backends/roadrunner_backend.py --fail-under=55
        uv run coverage report --include=src/ssys/ode_backends/interface.py --fail-under=80
        uv run coverage report --include=src/ssys/ode_backends/ida_sundials_backend.py --fail-under=75
        uv run coverage report --include=src/ssys/validator.py --fail-under=70

    - name: Upload coverage to Codecov
      if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  type-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        uv sync --extra dev

    - name: Type check with mypy
      run: |
        uv run mypy src/ --ignore-missing-imports

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Build package
      run: uv run --with build python -m build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-packages
        path: dist/

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install package
      run: |
        uv sync --extra dev

    - name: Test CLI
      run: |
        uv run ssys-recast --version

    - name: Run example (if manifest exists)
      run: |
        if [ -f tests/tests.manifest ]; then
          mkdir -p output
          uv run ssys-recast --manifest tests/tests.manifest --outdir output
        fi
      continue-on-error: true
