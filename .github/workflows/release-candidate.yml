name: Release Candidate

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Build source and wheel distributions
      run: uv run --with build python -m build

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: release-dist
        path: dist/

  wheel-smoke:
    runs-on: ${{ matrix.os }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
    - uses: actions/checkout@v4

    - name: Download release artifacts
      uses: actions/download-artifact@v4
      with:
        name: release-dist
        path: dist/

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install wheel and run CLI smoke
      shell: bash
      run: |
        python -m venv .wheel-smoke
        python - <<'PY'
        import glob
        import os
        import pathlib
        import subprocess
        import tempfile

        venv = pathlib.Path(".wheel-smoke")
        python_exe = venv / ("Scripts/python.exe" if os.name == "nt" else "bin/python")
        recast = venv / ("Scripts/ssys-recast.exe" if os.name == "nt" else "bin/ssys-recast")
        subprocess.check_call([str(python_exe), "-m", "pip", "install", "--upgrade", "pip"])
        subprocess.check_call([str(python_exe), "-m", "pip", "install", *glob.glob("dist/*.whl")])

        freeze_file = pathlib.Path(
            "dependency-versions-${{ matrix.os }}-${{ matrix.python-version }}.txt"
        )
        with freeze_file.open("w") as handle:
            subprocess.check_call([str(python_exe), "-m", "pip", "freeze", "--all"], stdout=handle)

        tmpdir = pathlib.Path(tempfile.mkdtemp())
        model = tmpdir / "decay.ant"
        model.write_text(
            "\n".join([
                "model decay()",
                "    species X;",
                "    X' = -k*X;",
                "    k = 0.5;",
                "    X = 1.0;",
                "end",
                "",
            ])
        )
        manifest = tmpdir / "models.manifest"
        manifest.write_text(f"{model}\n")
        outdir = tmpdir / "out"
        subprocess.check_call([str(recast), "--version"])
        subprocess.check_call([str(recast), "--manifest", str(manifest), "--outdir", str(outdir)])
        output = outdir / "decay_recast.ant"
        if not output.exists() or output.stat().st_size == 0:
            raise SystemExit(f"missing smoke output: {output}")
        PY

    - name: Upload dependency versions
      uses: actions/upload-artifact@v4
      with:
        name: dependency-versions-${{ matrix.os }}-${{ matrix.python-version }}
        path: dependency-versions-${{ matrix.os }}-${{ matrix.python-version }}.txt

  full-validation:
    runs-on: ubuntu-latest
    needs: build
    env:
      SSYS_REQUIRE_DAE_VALIDATION: "1"
    steps:
    - uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install release validation dependencies
      run: uv sync --extra dev --extra dae

    - name: Record dependency versions
      run: uv pip freeze --all > release-validation-dependencies.txt

    - name: Run full model integration validation
      run: uv run pytest tests/test_integration.py -m slow -v --no-cov

    - name: Upload validation dependency versions
      uses: actions/upload-artifact@v4
      with:
        name: release-validation-dependencies
        path: release-validation-dependencies.txt
