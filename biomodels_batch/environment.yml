name: ssys_benchmarks
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.12
  
  # Scientific stack (with numpy<2 for libroadrunner compatibility)
  - numpy<2.0
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - sympy>=1.12
  
  # BioModels API
  - bioservices>=1.11
  - requests>=2.31
  
  # Data handling and utilities
  - tqdm>=4.65
  
  # Jupyter
  - jupyter>=1.0
  - nbformat>=5.9
  
  # Parallel processing
  - joblib>=1.3
  
  # Pip-only packages
  - pip
  - pip:
      # SBML to Antimony conversion (standalone packages, NOT tellurium)
      - antimony>=2.13
      - libroadrunner>=2.5
      - python-libsbml>=5.20
      # JAX for fast validation (pinned for numpy<2 compatibility)
      - jax>=0.4.0,<0.4.26
      - jaxlib>=0.4.0,<0.4.26
